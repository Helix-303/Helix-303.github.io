<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Arena</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script>
</head>
<body>

    <div id="inicio" class="menu-box">
        <h1>NEON SAVAŞLARI</h1>
        <div class="ayar">
            <label>Top Sayısı (2-7):</label>
            <input type="number" id="numPelotas" value="6" min="2" max="7">
        </div>
        <div class="ayar">
            <label>İsimler (Virgülle ayır):</label>
            <input type="text" id="nombres" placeholder="Top1, Top2...">
        </div>
        <button id="jugar">BAŞLAT</button>
    </div>

    <div id="juego" class="game-container">
        <div class="hud">
            <button id="restart">Yeniden</button>
            <button id="backMenu">Menü</button>
        </div>
    </div>

    <footer>
    </footer>

    <script src="script.js"></script>
</body>
</html>
